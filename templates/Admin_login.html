<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 로그인 - 오토플렉스</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="background:#0a1628;display:flex;align-items:center;justify-content:center;min-height:100vh;">
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for category, message in messages %}
    <div class="alert alert-{{ category }}" style="position:fixed;top:0;left:0;right:0;">{{ message }}</div>
    {% endfor %}{% endif %}
{% endwith %}
<div class="admin-login-card">
    <div class="admin-logo">AUTOFLEX</div>
    <p style="color:#8899bb;margin-bottom:32px;font-size:0.85rem;">관리자 전용 페이지</p>
    <form method="post" class="order-form">
        <div class="form-group">
            <label style="color:#c8d4e8;">아이디</label>
            <input type="text" name="admin_id" placeholder="관리자 아이디" required autofocus>
        </div>
        <div class="form-group">
            <label style="color:#c8d4e8;">비밀번호</label>
            <input type="password" name="admin_pw" placeholder="비밀번호" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">로그인</button>
    </form>
</div>
</body>
</html>
